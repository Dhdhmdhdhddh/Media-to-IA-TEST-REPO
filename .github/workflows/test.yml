name: Test Download With Cookies

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube URL'
        required: true
        type: string

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Install yt-dlp
        run: pip install "yt-dlp[default]"

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Write cookies
        run: echo "${{ secrets.YT_COOKIES }}" > cookies.txt

      - name: Test download
        run: |
          NODE_PATH=$(which node)
          echo "Node path: $NODE_PATH"
          yt-dlp --verbose \
            --js-runtimes "node:$NODE_PATH" \
            --cookies cookies.txt \
            --extractor-args "youtube:player_client=web" \
            --format 18 \
            -o "/tmp/test.mp4" \
            "${{ github.event.inputs.video_url }}" 2>&1 | head -60

      - name: Check if file downloaded
        run: ls -lh /tmp/test.mp4 || echo "no file downloaded"
