name: Test Download No Cookies

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube URL'
        required: true
        type: string

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Install yt-dlp
        run: pip install "yt-dlp[default]"

      - name: Test download android client no cookies
        run: |
          yt-dlp --extractor-args "youtube:player_client=android" \
            --format 18 \
            -o "/tmp/test.mp4" \
            "${{ github.event.inputs.video_url }}"

      - name: Check if file downloaded
        run: ls -lh /tmp/test.mp4 || echo "no file downloaded"
